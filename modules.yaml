# doze plugin modules.
#
# Each module is an out-of-process doze engine plugin — a pure-Go binary built
# from a package in the doze repo and published as its own rolling release under
#   https://github.com/NerdMeNot/doze-modules/releases/download/<name>/
# with an index.yaml + per-platform archives. doze fetches a module by engine
# type, verifies its checksum, caches it under ~/.doze/modules, and runs it.
#
# Authoring/upgrading a module is a PR editing this file (bump version / add an
# entry); CI cross-compiles the four supported triples and publishes cumulatively.

# The doze source the plugins are built from (a tag, branch, or commit).
doze_ref: main

# triple list is fixed (mac+linux, no 32-bit, no intel-mac per project policy):
#   aarch64-apple-darwin, x86_64-apple-darwin,
#   aarch64-unknown-linux-gnu, x86_64-unknown-linux-gnu

modules:
  valkey:     { path: ./engine/valkey/plugin,     version: "0.1.0" }
  kvrocks:    { path: ./engine/kvrocks/plugin,    version: "0.1.0" }
  postgres:   { path: ./engine/postgres/plugin,   version: "0.1.0" }
  documentdb: { path: ./engine/documentdb/plugin, version: "0.1.0" }
  s3:         { path: ./engine/s3/plugin,         version: "0.1.0" }
  sqs:        { path: ./engine/sqs/plugin,        version: "0.1.0" }
  sns:        { path: ./engine/sns/plugin,        version: "0.1.0" }
  process:    { path: ./engine/process/plugin,    version: "0.1.0" }
